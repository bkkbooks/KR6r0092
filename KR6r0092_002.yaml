body:
  text: 宋江西沙門曉瑩集蔣山佛慧泉禪師叢林謂之泉萬卷紹聖元年東坡居士有嶺外之行舟次金陵阻風江滸既迎其至從容語道東坡遂問曰如何是智海之燈泉遽對以偈曰指出明明是甚麼舉頭鷂子穿雲過從來這碗最希奇解問燈人能幾箇東坡於是欣然以詩紀其事曰今日江頭天色惡炮車雲起風欲作獨望鍾山喚寶公林間白塔如孤鶴寶公骨冷喚不譍却有老泉來喚人電眸虎齒霹靂舌為余吹散千峰雲南來萬里亦何事一酌曹溪知水味他年若畫蔣山圖仍作泉公喚居士泉復説偈送行曰腳下曹溪去路通登堂無復問幡風好將鍾阜臨岐句説似當年踏碓翁噫東坡平生夷險一致非與憂患爭者不然正當放浪嶺海之時豈能問智海燈耶泉奮霹靂舌為吹散千峰之雲在東坡不為無得也寶峰湛堂準禪師有十二時頌曰雞鳴丑念佛起來懶開口上樓敲磬兩三聲驚散飛禽方丈後平旦寅當人有道事須親不聞先聖有慈訓莫認癡狂作近鄰日出卯大道分明莫外討日用縱橫在目前逢原左右拈來草食時辰更無一法可當情千里出山雲有色一源投澗水無聲禺中巳龍象須觀第一義若向其中覔是非見解何曾有李二日南午理事相諳更相互三門拈向燈籠頭休問他家覓歸路日映未法身清淨絶方比乾坤遐邇盡東西千山萬山翠相倚晡時申由來大道絶疏親陽和九月百花發須信壺中別有春日入酉淨室焚香孤坐久忽然月上漏東窗照我牀前瑞香斗黃昏戌樓上鳴鍾已落日行人旅店宿長途花上遊蜂罷采蜜人定亥老鼠此時正無礙忽然燈滅寢堂前牀前咬我靸鞋袋半夜子夢裏分明被人使連宵合藥到天光起來何處有白芷妙喜老師為誦出而書其後曰湛堂老人作十二時頌家風不減趙州而語録無有謹令侍者了德録數本送衆寮與衲子輩結般若緣惟正禪師字煥然華亭黃氏子幼從臨安北山資壽本如肆業且將較藝於有司如使禱觀音像以求陰相正謝曰豈忍獨私於己哉郡人朱紹安聞而嘉歎欲啓帑度之正慨然曰古人度人以清機密旨今返是去古亦遠矣吾墮三寶數當有其時已而遇祥符覃恩得諧素志既學三觀於天台復詣徑山參老宿居素而得旨素住淨土院正輔相久而繼席焉然為人高簡律身精嚴名卿巨公多所推重葉內翰清臣牧金陵迎正語道選日集賓欲以優禮尊奉及期正作偈辭之昨日曾將今日期出門倚杖又思惟為僧只合居巖谷國士筵中甚不宜又途中逢進山主以偈贈之曰貌古形疏倚杖藜分明畫出須菩提解空不許離聲色似聽孤猿月下啼正識慮洗然不牽世纍雅愛跨黃犢出入臨安守蔣侍郎堂有詩曰禪客尋常入舊都黃牛角上挂瓶盂有時帶雪穿雲去便好和雲畫作圖其為名公賞重如此平生製作號為錦溪集三十卷前二偈並見集中而出處大槩亦塔銘所載嗚呼世之童乎顛褐乎身則曰如是而為僧矣其知清機密旨之謂者亦幾希焉正之言雖似迂闊以藥吾徒濫廁之病於法門則未容無補也蘇黃門子由元豐三年以睢陽從事左遷筠陽榷管之任是時洪州景德順禪師與其父文安先生有契分因往訪焉相從甚樂咨以心法順示古德搐鼻因緣久之有省作偈呈順曰中年聞道覺前非邂逅相逢老順師搐鼻徑參真面目掉頭不受別鉗鎚枯藤破衲公何事白酒青鹽我是誰慚愧東軒殘月上一杯甘露滑如飴暨紹聖元年復至筠順化逾年矣公禮其繪像述讚于左曰與訥偕行與璉同處於南得法為南長子成就緇白可名為老慈憫黑暗可名為姥我初不識以先子故訪我高安示搐鼻語再來不見作禮縑素向也無來今亦奚去蓋順訥偕行出蜀而順嗣黃龍訥住圓通而大覺璉掌記室則與順同處唯以仁慈祐物叢林目之曰順婆婆公為表而出之良有以也雖嗣法無聞然有公則所謂一麟足矣建州開善謙禪師平居不倦誨人而形於尺素尤為曲折有曰時光易過且緊緊做工夫別無工夫但放下便是只將心識上所有底一時放下此是真正徑截工夫若別有工夫盡是癡狂外邊走山僧尋常道行住坐臥決定不是見聞覺知決定不是思量分別決定不是語言問答決定不是試絶却此四箇路頭看若不絶決定不悟此四箇路頭若絶僧問趙州狗子還有佛性也無趙州云無如何是佛雲門道乾屎橛管取呵呵大笑謙之言如雲廓天布以授學者與夫浮詞濫説何啻天冠地屨然福不逮慧出世未幾而卒於謙雖無恨惜乎法門不幸耳大溈智禪師號大圓叟居秀州青鎖之西菴時參政陳公去非相與過從講道為樂因問以寂然不動時如何智曰千聖不能覓其蹤又問感而遂通又作麼生智曰萬化不能覆其體公欣然以謂聞所未聞作小詩呈似於智以見意曰自得安心法悠然不賦詩忽逢重九日無奈菊花枝一日普淨院範鍾成盛集緇素讚喜公率智與焉公曰老僧首安能著語而擊哉西菴老人不可吝法布施智遂操鯨曰長子羅睺羅遵受如來敕撞鍾發大機阿難圓信入我今撞此鍾見聞獲大益上徹三千界下透無窮極塵劫逈寥寥太空常寂寂息苦與停酸皆承此恩力於是四衆歎呼為非常佛事智常舉三世諸佛不知有狸奴白牯却知有而拈曰三世諸佛既不知有狸奴白牯又何曾夢見灼然須知向上知有底人始得且作麼生是知有底人又繼以頌發揮之曰喫官酒臥官階當處死當處埋沙場無限英靈漢堆山積嶽靈尸骸其提唱又如此智出世而齒少雖作略不讓雄於諸方其奈摳衣者走大聲及居大溈則年運往矣是致道不克行而為有識所歎然參政為序語要謂其持臨濟宗自任以斯道之重者亦可謂知己哉佛眼禪師住舒州龍門嘗題語于延壽壁間曰佛許有病者當療治容有將息所也禪林凡有數名或曰涅槃見法身常住了法不生也或曰省行知此違緣皆從行苦也或曰延壽欲得慧命扶持色身也其實使人了生死處也多見少覺微恙便入此堂不強支吾便求補益及乎久病思念鄉閭不善退思滅除苦本先聖云病者衆生之良藥若善服食無不瘥者也又尊宿云須知有不病者故明書示以告後來觀其規詠風巾塵履者豈特今退思苦本而已抑欲使遵乍可有戒而死之訓其明切精審可謂藥石之言矣嗚呼是大醫王其佛眼之謂乎汝陽廣慧璉禪師泉州晉江人也世姓陳年志于學占報劬院之僧籍繼依招慶真覺禪師日事炊㸑有間誦經真覺見而問曰汝念甚麼經對曰維摩經真覺曰經在這裏維摩在甚麼處璉茫然無以酬泣涕曰大丈夫漢被人一問無詞可措豈不愧哉於是謁閩中尊宿僅五十餘員不能契旨即趨河南首山念禪師因致問曰學人到寶山空手回時如何念曰家家門前火把子璉豁然大悟尋擢居堂中第一座於景德甲辰歲開法廣慧是時王參政署由給事中出知汝陽璉入州治見其判事次便問作麼生是郡主一管筆王曰來者便判璉曰忽然總不恁麼來時如何王作擲筆勢又許郎中式漕西蜀經由謁璉適接見於佛前許曰先拜佛先拜長老璉曰蝦蟆吞大蟲許曰恁麼則總不拜去也璉曰運使話墮許曰許長老具一隻眼璉以衣袖便拂許曰今日看破便禮拜丁晉公以詩送宣賜進奉紅綃封龍字茶與璉密緘龍焙火前春翠字紅綃慰眼新品字至高誰合得隻林樹下上乘人其為名公尊崇若此景祐三年歲在丙子正月二十六日示四圓相自書虎狗鼠牛字於中揭方丈門遂至九月二十六日而逝景德間宗師為高明士大夫歆艷者廣慧而已迹其風尚既拔乎類況享壽八十有六而預知報謝因紀次大槩以補僧寶傳之闕庶不殞其美也金陵華藏民禪師初講楞嚴經於成都聽徒獨盛于時圜悟禪師住昭覺民率其友勝公扣以教外別傳之旨偶僧請益十玄談方舉問君心印作何顏圓悟厲聲曰文彩已彰民聞而恍然自謂至到矣圜悟知其以意領解遂示本色鉗鎚民則罔措數日復陳己見曰拈椎竪拂豈不是一切世界諸所有物皆即妙明真心圜悟曰汝元來在這裏作活計民又曰下喝敲牀豈不是反聞聞自性性成無上道圜悟曰教中道妙性圓明離諸名相本來無有世界衆生是如何民悚然無以酬逮圜悟出蜀住湖北夾山民亦罷講而至因晚參舉僧問巖頭古帆未挂時如何巖頭云後園驢喫草民莫涯其意乃詰於圜悟及使理前話而問乃答以庭前柏樹子民遽大徹尋命為堂中第一座圜悟升堂有偈美之曰休淹四分罷楞嚴按下雲頭徹底參莫學亮公親馬祖須知德嶠訪龍潭七年往返遊昭覺萬里翱翔上碧巖今日煩充第一座百花叢裏現優曇勝亦為圜悟之嗣住泗州普照號法濟禪師也福州空首座在江西雲門菴一日妙喜老師問其香嚴上樹話對以好對春風唱鷓鴣及徵之是樹上語是樹下語空罔然尋避寇之曹溪復趨臨川疏山時草堂清和尚在焉因看前話有所證自謂頓見妙喜用處遂歸閩寓古田秀峰道望四馳而屢却名剎之招東禪淨禪師有偈調之曰山龜有殼藏頭尾七十二鑽不奈何恰似秀峰空首座嘉招不肯出煙蘿答曰敢將不出以為高朽索其如六馬何賴有舀溪長柄杓不妨霜月在松蘿空之偈句風韻高妙於事理尤為圓融如贈撮藥道人曰當陽拈出大家看來處分明去處端總是諸人自遮護先生毫髮不相謾又貽修漏道者曰是處叢林走一遭敲甎打瓦不辭勞忽然踏著通天竅始覺從前立處高又雪中和僧偈曰蓋覆乾坤似有功洞然明白又無蹤其如未識無蹤處玉屑霏霏落眼中曾侍郎吉甫嘗有詩寄之曰江西句法空公得一向逃禪挽不回深密伽陀妙天下無人知道派中來其為名公擊節如此潭州智度覺禪師幼聰慧書史過目成誦欲著書排釋氏惡境忽現乃悔過出家因冥誦華嚴經至現相品曰佛具無有生而能示出生法性如虗空諸佛於中住無住亦無知處處皆見佛於是悟入華嚴境界為衆講解于成都剖發微旨無出其右尋以未探禪宗出峽謁無盡居士於荊南無盡曰若向上一著非蔣山老孰能指南遂遣書為覺紹介其略曰覺華嚴乃吾鄉大講主前遇龍潭為伊直截指示決成法器有補宗門矣覺抵蔣山一日聞圜悟舉羅山道有言時騎虎頭收虎尾第一句下明宗旨無言時覿露機鋒如同電拂覺恍然自謂有所證作偈曰家住孤峰頂長年半掩門自嗟身已老活計付兒孫圜悟見而大笑翌日問之曰昨日公案作麼生覺擬對圜悟便喝曰佛法不是這箇道理自茲參究經于五載閲浮山遠禪師削執論於廬阜有云若道有親疏者豈有旃檀林中却生臭草須知宗師著著不曾虗發至是頓釋所疑乃述偈寄圜悟曰出林依舊入蓬蒿天網不可逃誰信業緣無避處回來不怕語聲高其得樂説之辨以扶宗振教為己任非馳騁於駕詞而已至於宗門統要機緣無不明之以頌古今名僧行實無不著之以傳雖博而寡要勞而少功既藏于蜀山豈不壯叢林寂寞之傳耶吉州禾山方禪師元符戊寅歲至豫章翠巖參禮死心和尚已而執侍閲五載死心既謝院事寓靖安祐聖琚公席下唯方與俱日以禪悅為樂使方述文而祭死心危坐一榻神觀自若而緇素環侍其文曰維崇寧元年歲次壬午六月七日參徒比丘惠方謹以大虗為盤萬像為饌致祭于死心和尚之靈混元之精廓爾發生氣孕南方剛烈煥明兩踞猊座祖令嚴行一旦拂衣衲子趨瞪峻機電卷孰敢論評入煩惱海現涅槃城隨機發藥省彼狂酲含光育德混入枯榮得大自在遊戲寰瀛一法若有萬像崢嶸尚亨噫死心平生訶佛罵祖氣蓋諸方故叢林目為新孟八及退藏于密則自處固不輕矣而於師弟子之間乃為兒戲事又豈可以常情測度哉翰林學士楊公大年由祕書監出牧汝州時廣慧有璉禪師在焉公至首謁之問曰布鼓當軒擊誰是知音者璉曰來風深辨公曰恁麼則禪客相逢只彈指璉曰君子可入公應喏喏及相與夜話璉曰祕監曾與誰語及此事來公曰曾問雲門諒監院兩箇大蟲相咬時如何諒對以一合相亦嘗自著語曰我只管看未審恁麼道還得也無璉曰老僧即不然公曰請別道看璉以手作拽鼻孔勢曰這畜生更勃跳公於言下知有遂酬酢達旦自是咨詢經于半載礙膺之物嚗然而釋乃與尊宿激揚機語裒而號汝陽禪會集因自著敘曰粵以達磨西來少林壁觀心燈續照信衣密傳逮六世而花果乃成流諸方而葦麻斯衆隨機有得證道同歸雖性地恆明而言樞差別師承異稟體用致殊河獸深淺非觀慧而孰分城乳醇醨亦法味之隨變差毫髮而彌隔滯筌罘而易分自南嶽懷讓為曹溪嫡子讓傳馬祖道一一傳百丈懷海海傳黃檗希運運傳臨濟義玄玄傳興化存獎獎傳汝州南院顒顒傳風穴延沼沼傳首山念念傳廣慧元璉璉於曹溪為十世爰有俗士潛心空諦勤求知識多歷年所滯於言句迷乎物我𮊠官之故宿緣是契咨詢釆索渺瀰時序恍然啓悟洞見真常有法昭者傳法於葉縣歸省省亦嗣於念居多集會形於問答扣侍座隅隨時疏録屬有好事傳布襄陽南雍名區招提並列大士間出一音迭吼互為主伴更有酬對其谷隱紹遠玉泉守珍同嗣石門徹白馬令嶽嗣先白馬倫普寧歸道嗣德山密正慶惠英鹿門山主惠昭同嗣雲居齊凡六大士洎廣教省並存言唱用咨提振仍復討歷遺集詳求昔範或盡相善或虗其對有別語焉有代語焉往哲深意初心勤請或教舉其要或顯其旨有拈語焉有垂語焉躡前以申問者列為進語因時而興論者備諸辨語後有同參之淨侶經途之禪客公齋胥會精廬環坐隨方扣擊尋常應報者或用掇集以布於同志凡十有三卷云爾嗚呼六一居士謂公以文章擅天下然性剛徑寡合觀夫公齋務簡與宗師激揚萃集機語布於同志以其所存實聖賢高致也溫州江心龍翔肱禪師天資嚴重能蹤迹其師高菴悟公之為人其偈句亦精妍叢林頗傳誦之因謝事龍翔遊鴈蕩戲題龍鼻水以見意曰雨足雲收得暫間謾將頭角寄空山鼻端一滴無多子引得人人到此間肱後住筠陽洞山退寓雲居三塔而終然雲居乃受道之地流行坎止任之以緣復與高菴冥會此非偶然耳黃龍菴主者初承南禪師遺命領住山緣十有二白於法席正盛時毅然謝事居西園以晦名其堂且曰吾所辭者世務耳今欲專行佛法也於是榜其門曰告諸禪學要窮此道切須自看無人替代時中或是看得因緣自有歡喜入處却來入室吐露待為品評是非淺深如未發明但且歇去道自現前苦苦馳求轉增迷悶此是離言之道要在自肯不由他悟如此發明方名了達無量劫來生死根本若見得離言之道即見一切聲色言語是非更無別法若不見離言之道便將類會目前差別因緣以為所得只恐誤認門庭目前光影自不覺知翻成剩法到頭只是自謾枉費心力宜乎晝夜克己精誠行住觀察微細審思別無用心久遠自然有箇入路非是朝夕學成事業若也不能如是參詳不如看經持課度此殘生亦自勝如亂生謗法若送老之時敢保成箇無事人更無他纍其餘入室今去朔望兩度却請訪及紹興庚申冬獲斯榜於南蕩空禪師處空嗣死心能詳晦堂平居行事然須學者渴法乃與開示以朔望為準殆謂是也保寧璣道者元祐間住洪州翠巖時無盡居士張公漕江西絶江訪之璣逆於途公遽問曰如何是翠巖境對曰門近洪崖千尺井石橋分水繞松杉公曰尋常只聞師道者之名何能如是祇對乎璣曰適然耳公笑而長哦曰野僧迎客下煙嵐試問如何是翠巖門近洪崖千尺井石橋分水繞松杉遂題于妙高臺今有石刻存焉三祖會禪師者天資敬嚴臨衆煩苛故叢林無善譽色目之為會魔子因持鉢歸示衆舉世尊入舍衛乞食至須菩提白佛言希有世尊此者山僧至深村陜路一婆子亦乘轎來不免各下轎而過婆子問曰和尚向甚處去遂對以持鉢去婆子云啞著甚來由大衆你且道這婆子言啞著甚來由與須菩提歎希有世尊是同是別若道同甚麼處是同若道別未具衲僧眼在會乃天衣懷公之嗣緣雖不稔而機辨逸挌烏巨行公固嘗稱其作略似臨濟下金剛眼睛獅子爪牙者蓋此老亦服膺矣天童覺禪師因歲暮過衛寺丞進可之廬有堂曰六湛蓋取楞嚴六處休復同一湛然之義且覔偈發揮其旨覺即賦曰風瀾未作見靈源六處亡歸體湛存諸法性空方得座一彈指頃頓開門寒梅籬落春能早野雪櫺窗夜不昏萬像森羅心印印諸塵超豁妙無痕妙喜老師自徑山繼至衛命和之曰非湛非搖此法源當機莫厭假名存直須過量英靈漢方入無邊廣大門萬境交羅元不二六窗晝夜未嘗昏翻思龐老事無別擲劒揮空豈有痕世俗名堂室必於儒書意在燕休間適而已其欲資坐進此道取於佛經蓋亦鮮矣所以天童賦偈美之徑山依韻和之是皆指以入道捷徑略不少惜眉毛耳西蜀顯禪師者落髮師乃紹覺白公有偈送之南遊曰古路迢迢自坦夷臨行不用更遲疑他時若到諸方日為我分明舉似伊既至海會參禮演和尚一日演語曰我固知你見處只是未過白雲關是時圜悟為侍者顯密以白雲關意扣之圜悟曰你但直下會取已而演自城歸顯偕圜悟入城相值於興化演曰記得在那裏相見來顯曰全火祇候演顧圜悟曰這漢饒舌矣由是機語相契久而辭歸蜀演為小參曰離鄉四十餘年一時忘却蜀語禪人回到成都切須記取魯語顯旋成都紹覺住昭覺使顯應長松之命開堂拈香曰一則爐鞴功精一則磨淬極妙二功並著理孰為先不見道本重末輕當風可辨此香奉為紹覺和尚爇向爐中令教普天匝地置溝塞壑使天下衲僧無出氣處嗚呼言浮其實欲隱彌露無乃計之左乎其與一宿覺蓋相萬也至於𤼭善戴嵩之筆故叢林目為顯牛子既以小技溷掩道望以故情謬紊師承而為後世矜式其可耶邵武吳學士諱偉明字元昭參道於海上洋嶼菴與彌光藏主為法友別去未幾於南劒道中有省乃頌妙喜老師室中所問十數因緣今紀其一曰不是心不是佛不是物通身一穿金鎖骨趙州參見老南泉解道鎮州出蘿蔔遂致書以頌呈謂不自謾也妙喜即説偈證之曰通身一穿金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊繼而光往邵武相訪亦和之曰通身一穿金鎖骨正眼觀來猶剩物縱使當機覿面提敢保居士猶未徹妙喜亦嘗謂元昭有宗師體裁又稱光為禪狀元諒其然乎以之追蹤丹霞龐老故事可無愧也虎丘隆禪師道貌如甚愞者與圜悟禪師潭之道林法席一日圜悟開曰見見之時見非是見見猶離見見不能及遂竪起拳云見麼隆曰見圜悟曰頭上安頭隆於言下領旨尋俾掌藏教有問圜悟曰隆藏主柔易如此何能為哉圜悟曰瞌睡虎耳及住虎丘道大顯著因追繹白雲端和尚立祖堂故事乃曰為人之後不能躬行遺訓於義安乎遂圖像奉安題讚于上達磨曰闔國人難挽西攜隻履歸只應熊耳月千古冷光輝百丈曰迅雷吼破澄潭月當下曾經三日聾去却膏肓必死疾叢林從此有家風開山明教大師曰春至百花觸處開幽香旖旎襲人來臨風無限深深意聲色堆中絶點埃嗚呼百丈創立禪規以來叢林卒不至於阤廢實本于此白雲以百丈配享達磨有識靡不韙其議可謂知本矣隆既能遵行奉先之禮又從而為讚發明其道有足多也靈源禪師居黃龍昭默堂與東湖居士徐師川夜話遂及陳述古嘗對東坡談禪東坡謂其如説食龍肉且以自所論若食豬肉實美而真飽也靈源曰此乃東坡早歲趂後發言不覺負墮當為明之於是成二偈東坡笑説喫龍肉舌底那知已咽津能省咽津真有味會言龍肉不為珍又曰何知龍肉即豬肉細語粗言盡入神惜彼當年老居士大機曾未脫根塵師川笑曰至哉斯言惜老坡不聞也噫東坡詩有前身自是盧行者之句蓋自知從佛祖中來矣然較所學於述古可謂前言戲之耳靈源欲杜其從而作説者以偈辨明厥有旨哉興元府吳恂字德夫以元豐元年任豫章法曹時郡帥王觀文韶迎晦堂和尚入城館於大梵院而咨心要吳亦往參扣晦堂曰公平生學解記憶多聞即不問父母未生已前道將一句來吳窘無以對遂於行住坐臥提撕此語忽自知有而機莫能發乃閲傳燈録至鄧隱峰倒卓而化其衣順體不褪深以為疑自是遍問尊宿或答以神通妙用或答以般若力資疑終不釋復趨晦堂而問之晦堂笑曰公今侍立是順耶是逆耶吳曰是順晦堂曰還疑否吳曰不疑晦堂曰自既不疑何疑於彼吳於言下大徹嘗有二偈題于晦堂中無門戶四無旁學者徒勞捉影忙珍重故園千古月夜來依舊不曾藏又廬峰居士舊門人邈得師真的的親大地撮來成箇眼翻騰別是一般新晦堂有偈送之海門山嶮絶行蹤踏斷牢關信已通自有太平基業在不論南北與西東噫吳為府椽能自公餘暇質疑於尊宿與一行作吏此事便廢者遠矣是時叢林皆傾慕其風采亦可謂特立之士林間録以德夫為敦夫無乃誤耶潛菴源禪師初謁泐潭月和尚月問曰自何而來作箇甚麼源曰近離洪州欲學佛法月曰殿裏有去學取源曰今日撞著箇泥堆月曰白日裏見鬼源便喝既而趨黃檗與南禪師法席源為人外若簡淡而中敏南公喜之命執侍最久而源侍者之名遂著叢林嘗頌三關話曰拈一放一烏光黑漆打破畫瓶青天白日欲識鷲峰峰上機摩訶般若波羅蜜年逾八十而喪明學者益親附之有欲版其語要流通源設拒曰若吾語深契佛祖從今百日間目復有明則副汝請如期果愈緇素讚喜曰得非般若之驗歟壽九十有六而遷寂建炎己酉冬訖後事不數日虜犯洪城殺戮無噍類源不罹斯厄非道德所致耶明州智朋禪師初為寶峰持鉢至焦山時方丈成枯木與照闡提俱嗣芙蓉楷公先後得法未嘗相識成問朋曰寶峰有何言句朋即呈照自題肖像曰雨洗淡紅桃萼嫩風搖淺碧柳絲輕白雲影裏怪石露流水光中枯木春咦你是何人成稱賞之曰今日方知寶峰親見先師來又指以問朋曰汝會麼朋曰不會成曰汝記得法燈擬寒山否朋遂誦至誰人知此意令我憶南泉於憶字處成遽以手掩朋口曰住住朋豁然有省朋後出世衡州花藥為照之嗣尋遷婺州天寧先是崇寧二年詔州郡建禪苑以萬壽配紀元為額于時有致法門興衰之慶於妙湛禪師妙湛謝之曰乃今而後安得明眼尊宿三百六十員布於天下耶第恐法門衰由是矣至政和元年改崇寧為天寧朋之住天寧在紹興七年陳僑寓混殽於有司遂奉聖旨改報恩廣孝得專一追崇指揮逮十五年易廣為光蓋事權輿於朋矣故録朋能推廣聖孝於無垠而併記妙湛之言妙湛住雪峰而終死心禪師紹聖間住江西翠巖法堂後有齊安王祠威靈甚著死心徙祠於院西偏即址以建丈室設榻燕寢蟒蟠身側叱去復來夜以為常一夜將三鼓夢冠裳者涌謁極陳遷居非所樂欲假莊丁六十輩南遊二廣死心在夢諾之居無何莊丁家疫癘大作物故如數而後已遂設問於學徒曰且道果有鬼神乎若道有又不打殺死心若道無莊丁為甚麼死時下語鮮有契者適楚源首座自寶峰真淨會中來死心如前問之源曰甜瓜徹蒂甜苦瓠連根苦死心笑而已源應機鈍甚寂音目為源五斗蓋開口取氣炊熟五斗粟方能酬一轉語妙喜老師𤼭嘗為源見知因謁李商老逾年而歸源讓之曰啞荒了也豈不念無常迅速乎老師晚年常以此語學徒且謂當時不覺汗下嗚呼寶峰號江西法窟源於其間持維挈綱激勵英俊亦不失陳蒲鞋之為人也贛州顯首座賦性高逸機辨自將保寧勇禪師以子育之因示以神劒頌提得神鋒勝太阿萬年妖孽盡消磨直饒埋向塵泥裏爭奈靈光透匣何顯曰謾效顰亦提得一箇勇曰何不呈似老僧顯便舉云凜凜寒光出匣時乾坤閔爍耀閃輝當鋒坐斷毗盧頂更有何妖作是非勇曰忽遇天魔外道來時如何顯以坐具便摵勇作倒勢顯拂袖而行勇曰且來顯曰且待去掘窟勇笑而已尋謁端禪師於白雲端稱於衆待以猶子之禮一日端與淨居瑤公遊水磨顯偕數衲先在遂侍端右瑤曰顯兄且莫妨穩便端曰從他在此聽説話顯曰不曾帶得標手錢來便行二老相顧為之解顏既而遊湘西寓鹿苑真如禪師使之分座攝納久而歸贛上或傳住西堂而終顯之參保寧如太原孚在雪峰及趨白雲似大禪佛到霍山雖具有體裁何竟無聞哉得非溪邊老嫗喚其舊名耶佛鑑禪師元符二年首衆僧於五祖于時太平靈源赴黃龍其席既虗靈源薦佛鑑於舒守孫鼎臣遂命之出世演和尚付法衣佛鑑受而捧以示衆曰昔釋迦文佛以丈六金襴袈裟披千尺彌勒佛身佛身不長袈裟不短會麼即此樣無他樣自是一衆悚服及禮辭次演曰大凡應世略為子陳其四端雖世俗常談在力行何如耳一福不可受盡福盡則必致禍殃二勢不可使盡勢盡則定遭欺侮三語言不可説盡説盡則機不密四規矩不可行盡行盡則衆難住其詞質而理優足以救過遠惡亦猶藥不在精粗愈病者為良耳明州啓霞宏禪師秀峰祥公之嗣為人剛峭不妄言笑故有鐵面之名於叢林嘗著法寶傳三卷烏巨行公為序冠其端略曰凡禪門正法眼藏皆見于傳有引以敘其機緣有頌以顯其宗要學者覽之宗要明而機緣得矣茲可見傳之大槩然啓霞介於天童育王之間衲子過門必與勘驗一日有僧稱衡陽人與師同里閈侍者通謁宏拽杖且行且語曰不去參禪學道來認鄉人討箇甚麼僧擬議即以杖打出其攝物類如此院之山林深秀有貴人卜葬所親迎柩至宏堅臥其穴不克喪事郡守仇待制遣人諭之曰千年常住一朝僧長老何苦爭耶宏曰不可以一朝僧壞千年常住貴人亦賢者善其言而改圖又行事類如此宏雖緣不勝而以千年常住為己任足可羞結情固位者之顏矣至於剛正之操勤儉之德挺挺有祖風烈可謂大溈哲公之有孫也馮給事濟川紹興八年隨僧夏于徑山因題枯髏圖曰形骸在此其人何在乃知一靈不屬皮袋妙喜老師見而謂之曰公何作此見解耶即和曰只此形骸即是其人一靈皮袋皮袋一靈馮於是悚然悔謝是時堂中首座九仙清禪師亦繼之曰形骸在此其人何在日炙風吹掩彩掩彩清乃惠日雅公之嗣寶峰闡提照禪師有法語五則示其宗旨以付聰藏主一曰曹山立四禁盡衲僧命脈透得過切忌依倚將來了事人須別有生機一路二曰衲僧向異類中行履先德道異類墮此是了事人病明安道須是識主始得三曰闡提尋常向人道不得參禪不得學佛只要伊如大死人只恐聞此語作無事會作無法可當情會正是死不得若是死得決不肯作這般見解他時為人切宜子細四曰吾家立五位為宗往往人以理事明以寂照會以能所見以體用解盡落今時何得名為教外別傳之妙生死路頭那箇是得力處總不恁麼時如何卜度即不中五曰有情故情滲漏有見故見滲漏有語故語滲漏設得無情無見無語拽住便問他你是何人闡提平時不謾許與而囑纍於聰其任固重聰必頴然秀出於門弟子之間者夫何出世福清之天王不克行道而終遂致名亦不聞於叢林也薦福本禪師紹興十年首衆僧於徑山有偈示聰上座曰毒蛇猛虎當前立鐵壁銀山在後橫進既無門退無路如何道得出常情聰還鄱陽取道徽州謁太守吳元昭因出似之吳曰毒蛇猛虎空相向鐵壁銀山謾自橫長笛一聲歸去好更於何處覔疑情吳與本以同參契分更唱迭和與夫捉杯笑語為治劇餘樂則有間矣若非透脫情境安能爾耶石霜清素侍者閩之古田毛巖乃生緣也晚遁湘西鹿苑以間淡自牧兜率悅公時未出世與之鄰室有客惠生荔支悅命素曰此乃老人鄉果可同餉也素慨然曰自先師去世不見此矣悅從而問之師為誰耶對以慈明悅乃乘間致密款其緒餘素因問子曾見何人悅以真淨文和尚告之素曰文又見誰耶悅曰南禪師素曰南匾頭在石霜不久其道盛如此悅益駭異尋袖香咨扣素曰吾福解緣寡豈可為人師但子之見解試吐露看悅即具陳素云只可入佛不可入魔須知古德謂末後一句始到牢關悅擬對又遽問以無為如何説悅又擬對而素忽高笑悅恍然有得故嘗以語無盡居士張公逮崇寧三穓寂音尊者謁無盡於峽州善溪無盡曰昔見真淨老師于皈宗因語及兜率所謂末後句語尚未終而真淨忽怒罵曰此吐血禿丁脫空妄語不用信既見其盛怒不敢更陳曲折然惜真淨不知此也寂音曰相公惟知兜率口授末後句至於真淨老師真藥現前而不能辨何也無盡駭曰真淨果有此意耶寂音徐曰疑則別參無盡於言下頓見真淨用處即取家藏真淨肖像展拜題讚其上以授寂音曰雲菴綱宗能用能照冷面嚴眸神光獨耀孰傳其旨覿露唯肖前悅後洪如融如肇厥後有以讚鑱石于仰山寂音亦有二偈示悅之侍者智宣云素公死後間名在末後句如黃石書殺盡英雄人不見子房兩眼似愁胡又曰無為兩字如何説開口知君病轉深試問舊時宣侍者不言不語笑吟吟噫悅能扣素而不能忘其轍迹致無盡隨墮其中非寂音發真淨瞑眩之藥何能愈無盡膏肓之疾耶信宗師為人各有惠利豈易測其涯涘哉佛眼遠禪師初至海會依演和尚以己事咨決者屢矣演只語之曰我不如你你自會得好或曰我不會我不如你遠莫涯其意久而復扣曰今會中誰可親近演曰有元禮首座來時只向伊道衲僧須具緇素眼始得及聞我上堂道同門出入宿世冤家之語遂有省子若乞教於禮必須獲益及請問禮乃以手引遠之耳繞圍爐數匝且行且語你自會得好遠曰有冀開發却爾相戲豈法施之式哉禮曰汝他日悟去方知今日曲折已而寒夜孤坐撥爐見火一豆許恍然自喜曰深深撥有些子平生事只如此遽起閲機上傳燈録適當破竈墮因緣洞符所證圜悟因詣其寮舉青林搬土話驗之且謂古今無人出得遠曰有甚麼難出圜悟曰只如他道鐵輪天子寰中旨又作麼生出遠曰我道帝釋宮中放赦書圜悟退而語朋舊曰喜遠兄便有活人句也其後遠之嗣子烏巨行公有頌發揮海會之語曰我不會兮不如你達磨當門缺兩齒滿堂無限白蘋風明明不自秋江起又曰我不會兮不如你堪笑千花生碓觜善財謾説百城遊何曾踏著自家底仰山偉禪師者平時機語叢林鮮傳其見於仰山祖堂自讚曰吾真難貌班班駮駮擬欲安排下筆便錯又塔銘載示衆曰道不在聲色而不離聲色凡一語一默一動一靜隱顯縱橫無非佛事日用現前古今凝然理何差互妙喜老師謂其是講因明百法起信等論師及參得禪了開口更不著經論一字以其説禪方於雲蓋老智云端和尚於皇祐四年寓歸宗書堂郭功甫任星子主薄時相過從扣以心法逮端住承天遷圓通郭復尉於江州德化往來尤密端移舒州白雲海會郭乃自當塗往謁端問曰牛醇乎對曰醇矣端遽厲聲叱之郭不覺拱而立端曰醇乎醇乎於是為郭升堂而發揮之曰牛來山中水足草足牛出山去東觸西觸又不免送之以偈曰上大人丘乙己化三千可知禮未幾示寂郭為銘其塔略曰師之道超佛越祖師之言通今徹古收則絶纖毫縱則若猛虎可謂知言矣昔人逢僧話得半日之間尚見於詩況學牧牛卒致乎醇自載于塔亦不為過無盡居士見兜率悅禪師既有契證因詢晦堂家風於悅欲往就見悅曰此老只一拳頭耳乃潛奉書於晦堂曰無盡居士世智辨聰非老和尚一拳垂示則安能使其知有宗門向上事耶未幾無盡遊黃龍訪晦堂於西園先以偈書默菴壁曰亂雲堆裏數峰高絶學高人此遁逃無奈俗官知住處前驅一喝散猿猱徐扣宗門事果示以拳頭話無盡默計不出悅之所料由是易之遂有偈曰久響黃龍山裏龍到來只見住山翁須知背觸拳頭外別有靈犀一點通靈源時為侍者尋題晦堂肖像曰三問逆摧超玄機於鷲嶺一拳垂示露赤體於龍峰聞時富貴見後貧窮年老浩歌歸去樂從教人喚住山翁黃太史魯直聞而笑曰無盡所言靈犀一點通此藞苴為虗空安耳穴靈源作偈分雪之是寫一字不著畫嗟乎無盡於宗門可謂具眼矣然因人之言昧宗師於晦堂鑑裁安在哉悅雖得無盡樂出其門其奈狹中媢忌為叢林口實也死心禪師以大觀元年丁亥九月從洪帥李景直之命住黃龍山明年揭榜于門曰仰門頭行者賓客到來劃時報覆即不得容縱浮浪小輩到此賭博常切掃灑精潔凡置三門者何也即空無相無作三解脫門今欲登菩提場必由此門而入然高低普應遐邇同歸其來入斯門者先空自心自心不空且在門外戊子九月十八日死心叟白死心平日佛祖在所詆訶而於賓客不立涯岸如此其言典而嚴簡而悉於世出世間兩得之矣若使守法任者具如是施為何慮叢林之不振耶程待制智道曾侍郎天遊寓三衢最久而與烏巨行禪師為方外友曾嘗於坐間舉東坡宿東林聞溪聲呈照覺總公之偈溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈它日如何舉似人程問行曰此老見處如何行曰可惜雙腳踏在爛泥裏曾曰師能為料理否行即對曰溪聲廣長舌山色清淨身八萬四千偈明明舉似人二公相顧歎服吁登時照覺能奮金剛椎碎東坡之窠窟而今而後何獨美大顛門有韓昌黎耶雖烏巨向曾程二公略露鋒鋩豈能洗叢林噬臍之歎哉蘇州定慧信禪師蚤以百丈野狐頌得叢林之譽其頌曰不落不昧二俱是錯取捨未忘識情卜度執滯言詮無繩自縛春至花開秋來葉落錯錯誰知普化搖鈴鐸又貽老僧曰俗臘知多少龐眉擁毳袍看經嫌字小問事愛聲高暴日終無厭登階漸覺勞自言曾少壯遊嶽兩三遭信為明眼宗匠此乃其遊戲耳然品題形貌之衰憊摸寫情思之好尚抑可謂曲盡其妙矣樞密蔣公頴叔與圓通秀禪師為方外友公平日雖究心宗亦泥于教乘因撰華嚴經解三十篇頗負其知見元豐間漕淮上至長蘆訪秀而題方丈壁曰余凡三日遂成華嚴解我於佛法有大因緣異日當以此地比覺城東際唯具佛眼者當知之于時秀辨之曰公何言之易耶夫華嚴者圓頓上乘乃現量所證今言比覺城東際則是比量非圓頓宗又云異日且一真法界無有古今故云十世古今始終不離於當念若言異日今日豈可非是乎又云具佛眼者方知然經云平等真法界無佛無衆生凡聖情盡彼我皆忘豈有愚智之異若待佛眼則天眼人眼豈可不知哉公於是悔謝及秀示寂公以文祭之曰方外之友唯余與師念昔相見一語投機師來長蘆我漕淮沂亦復交臂笑言熙怡我論華嚴師為品題陷虎機緣脫略徑畦曷為捨我先其往而蔬奠致誠庶其歆之嗚呼公於華嚴非素業矣而欲追蹤棗柏大士遊普賢行願海未免背馳秀不敢孤方外契為之辨明然一字之師似可羞張回浪稱於齊己也襄陽谷隱顯禪師生於西蜀安樞密之別業田丁家南遊參仰山偉公因致問如何是佛向上事偉對以日出東方夜落西顯復進語東方向上更望指示語未竟而偉便打於是有省及住谷隱以仰山忌日對靈拈香曰仰面不見天低頭不見地不知大仰來不來一炷旃檀表勤意顯為人誠至道學純正安公嘗攜家屬致拜且語人曰不意有一佛出吾家地上遂奏淨覺禪師號以伸敬焉蓋取其蘊略其所出可謂道在一介則一介重也潭州雲蓋智和尚居院之東堂政和辛卯歲死心謝事黃龍由湖南入山奉覲日已夕矣侍僧通謁智曳履且行且語曰將燭來看其面目何似生而能致名喧宇宙死心亦絶呌把近前來我要照是真師叔是假師叔智即當胸驅一拳死心曰却是真箇遂作禮賓主相得歡甚及死心復領黃龍至政和甲午十二月十五日示寂時智住開福得其訃音即升座曰法門不幸法幢摧五蘊山中化作灰昨夜泥牛通一線黃龍從此入輪回侍僧編次易入為出智見而大詬是時智年九十可謂宗門大老矣視死心為猶子聞訃歎法幢之摧蓋前輩以法道故今則不然生譽死毀與市輩無異真可羞也泉州教忠光禪師與李參政漢老在小溪雲門菴妙喜會中有同參契分李因致光住教忠功德院其疏有三拜頓忘師弟子一口吞盡佛衆生之句為叢林傳誦既而李病將革以偈寄光曩歲曾經度厄津深將法力荷雲門如今稍覺神明復擬欲酬師不報恩光即和之胡牀穩坐已通津何處更尋不二門八苦起時全體現不知誰解報深恩李得其報閲罷而逝其處生死之大變泊然不亂而言神明還復可見平日所養矣東坡謂生死之際不容其偽李殆庶幾焉李文和公大中祥符間嘗作二句頌寄朱發運正辭是時許郎中式亦漕淮南朱遂以李頌示許相與聯成四句曰參禪須是鐵漢著手心頭便判李雨催樵子還家朱風送漁舟到岸許仍命浮山遠公和之曰參禪須是鐵漢著手心頭便判通身雖是眼睛也待紅爐再鍛鉏麑觸樹迷封豫讓藏身吞炭鷺飛影落秋江風動蘆花兩岸文和公尋復自和曰參禪須是鐵漢著手心頭便判直趣無上菩提一切是非莫管今唯傳後一頌而已然世謂士夫學禪只資談柄亦宗知文和之唱諸公之和其語徑正有宗師體裁也哉明州和菴主從南嶽辨禪師遊叢林以為飽參及逸居雪竇之前山栖雲菴有志於道者多往見之雪竇主者嫉其軋己因郡守周舍人聞其名而問之對云一常僧耳和遂題三偈于壁徙居杖錫山一曰自從南嶽來雪竇二十餘年不下山兩處居菴身已老又尋幽谷養衰殘二曰十方世界目前寬拋却雲菴過別山三事壞衣穿處補一條藜杖伴清間三曰黃皮裹骨一常僧壞衲蒙頭百慮澄年老懶能頻對客攀蘿又上一崚嶒和之清名高德出自所守而神蘂形茄亦何與於世然猶取忌於時卒致徙居噫名德纍人信矣夫百丈珍禪師有開山大智禪師讚曰要識百丈祖師只這目前便是若更顧佇思量何止落在第二向未遭喝已前識渠面目尋扭住作聲時全無巴鼻誰云馬駒踏殺天下人出得這一箇得恁衰氣元來不直半分始解兒孫滿地珍乃建陽人天資和雅篤為杜多之行搭以粗繒僧伽梨韻致高古由是得珍布衲之名於叢林也廬山慧日雅禪師乃真淨高弟嘗著禪本草一篇曰禪味甘性涼安心臟祛邪氣闢壅滯通血脈清神益志駐顏色除熱惱去穢惡善解諸毒能調衆病藥生人間但有大小皮肉骨髓精粗之異獲其精者為良故凡聖尊卑悉能療之餘者多於叢林中吟風詠月世有徒輩多采聲殼為藥食者誤人性命幽通密顯非證者莫識不假修煉炮製一服脫其苦惱如縛發解其功若神令人長壽故佛祖以此藥療一切衆生病號大醫王若世明燈破諸執暗所慮迷亂幽蔽不信病在膏肓妄染神鬼流浪生死者不可救焉傷哉噫世稱韓昌黎毛頴傳以文章為滑稽若禪本草寧免併按者歟先佛號大醫王而修多羅藏得非方書乎況禪本草從藏中流出議病且審使藥且親其有服食獲證大安樂地也必矣由是觀之雅豈徒然哉湛堂準禪師與雅公為法門昆仲因雅述禪本草乃製炮炙論佐之曰人欲延年長生絶諸病者先熟覽禪本草若不觀禪本草則不知藥之溫良不辨藥之真假而又不諳何州何縣所出者最良既不能窮其本末豈悟藥之體性耶近世有一種不讀禪本草者却將杜漏藍作綿州附子往往見面孔相似便以為是苦哉苦哉不唯自誤兼誤他人故使後之學醫者一人傳虗萬人傳實擾擾逐其末而不知安樂返本之源日月浸久橫病生焉漸攻四肢而害圓明常樂之體自旦及暮不能安席遂至膏肓枉喪身命者多矣良由初學粗心師授莽鹵不觀禪本草之過也若克依此書明藥之體性又須解如法炮製蓋炮製之法先須選其精純者以法流水淨洗去人我葉除無明根秉八還刀向三平等砧碎銼用性空真火微焙之入四無量臼舉八金剛杵杵八萬四千下以大悲千手眼篩篩之然後成塵塵三昧煉十波羅蜜為圓不拘時候煎一念相應湯下前三三圓後三三圓除八風二見外別無所忌此藥功驗不可盡言服者方知此藥深遠之力非世間方書所載後之學醫上流試取禪本草觀之然後依此炮製合而服之其功力蓋不淺也妙喜老師曰湛堂讀諸葛孔明出師表而知作文關楗遂著羅漢疏水磨記炮炙論嗚呼尊宿於世間學尚爾其審況出世間法乎若夫炮炙論文從字順詳譬曲喻而與禪本草相為表裏非真起膏肓必死之手何能及此哉鼎州靈巖安禪師為人奇逸機辨自將佛性泰公未出世時安以師事之及泰住德山遣安通嗣書于蔣山圜悟禪師爾時圜悟坐於丈室安捧書趨前圜悟曰千里馳達不辱宗風公案現成如何通信安曰覿面相呈更無回互圜悟曰此是德山底那箇是專使底安曰豈有第二人耶圜悟曰背後底聻安便度書圜悟曰作家禪客天然猶在安曰分付與蔣山乃下通首座大衆書於僧堂前首座問曰玄沙白紙此自何來安呈起書曰見麼首座遂引手攝安復執却曰久默斯要不務速説今日拜呈幸希一鑒首座便喝安曰作家首座首座又喝安打一書首座擬議安曰未明三八九不免自沈吟又以書打一下曰接圜悟與佛眼禪師立于法堂且盼甚作略圜悟厲聲曰打我首座死也佛眼曰官馬廝踏有甚憑據安曰説甚麼官馬廝踏正是龍象蹴踏也圜悟曰喚來喚來安復至法堂上圜悟曰我五百衆中首座你為甚麼打他安曰和尚也喫一頓始得圜悟顧佛眼吐舌而已佛眼曰未在乃顧安而問曰只如空手把鋤頭步行騎水牛人從橋上過橋流水不流意作麼生安低躬曰所供並是詣實圜悟笑曰元來是家裏人遂至五祖自禪師處自曰書裏説甚麼安曰文彩已彰自曰畢竟説甚麼安曰當陽揮寶劒自曰近前來這裏不識數字安曰莫詐敗自顧侍者曰這是那裏僧安曰莫侍者曰曾在和尚會下去自曰怪得恁麼滑頭安曰曾被和尚鈍置來自遂將書於爐上熏曰南無三滿多沒馱喃安近前彈指而已安再至蔣山坐夏圜悟使分座攝納秋辭歸圜悟曰子何所需安曰短歌須要十數文長句只消三兩言圜悟乃以頌嘉賞之曰使乎不辱命臨機貴專對安禪捋虎鬚著著超方外不唯明窗下安排掇向繩牀拶嶮崖拈椎豎拂奮雄辨金聲玉振猶奔雷九旬落落提綱宗衲子濟濟長趨風解粘去縛手段辣驅耕奪食猶雍容秋風忽作要歸去了却武陵一段事勃窣理窟乃胸中行行不患無知己臨行索我送行篇栗棘蓬與金剛圈短歌須要十數丈長句只消三兩言金毛獅子解翻身箇是叢林傑出人不日孤峰大哮吼五葉一花天地春自古禪會以專使為重任禮貌機辨兼而優為之者則不辱命矣安之若此可不謂全才乎羅湖野録跋前哲入道機緣禪書多不備具者其過在當時英俊失於編次是無衛宗弘法之心而然遂致有見賢思齊者徒增大息耳妙總窮居村落不聞叢林勝事久矣比者江西瑩仲溫遠自雙徑來訪山舍娓娓談前言往行殊慰此懷徐探囊中遂得羅湖野録一編所載皆命世宗師與賢士大夫言行之粹美機鋒之酬酢雄文可以輔宗教明誨可以警後昆於是詳覽熟思不忍釋手亦足以見仲溫為道為學之要其操心亦賢於人遠矣與天下好事者共之庶幾後世英俊繼而為之使夫佛祖之道光明盛大其功豈不博哉紹興庚辰十月二十日毗陵無著道人妙總謹書
