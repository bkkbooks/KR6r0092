body:
  text: 羅湖野録序愚以倦遊歸憩羅湖之上杜門卻掃不與世接因追繹疇昔出處叢林其所聞見前言往行不為不多或得於尊宿提唱朋友談説或得於斷殘碣蠹簡陳編歲月浸久慮其湮墜故不復料揀銓次但以所得先後會粹成編命曰羅湖野録然世殊事異正恐傳聞謬舛適足滓穢先德貽誚後來姑私藏諸以俟審訂脫有博達之士操董狐筆著僧寶史取而補之土苴罅漏不為無益云爾紹興乙亥十月望日湖隱堂釋氏子曉瑩敘
