body:
  text: 宋江西沙門曉瑩集趙清獻公平居以北京天鉢元禪師為方外友而咨决心法暨牧青州日聞雷有省即說偈曰退食公堂自憑几不動不搖心似水霹靂一聲透頂門驚起從前自家底舉頭蒼蒼喜復喜剎剎塵塵無不是中下之人不得聞妙用神通而已矣已而答富鄭公書略曰近者旋附節本傳燈三卷當已通呈今承制宋威去餘七軸上納抃伏思西方聖人教外別傳之法不為中下根機之所設也上智則頓悟而入一得永得愚者則迷而不復千差萬別唯佛與祖以心傳心其利生攝物而不得已者遂有棒喝拳指揚眉瞬目拈椎豎拂語言文字種種方便去聖逾遠諸方學徒忘本逐末棄源隨波滔焰皆是斯所謂可憐憫者矣抃不侫去年秋初在青州因有所感既已稍知本性無缺無餘古人謂安樂法門信不誣也比蒙太傅侍中俾求禪録抃素出恩紀聞之喜快不覺手舞而足蹈之也伏惟執事富貴如是之極道德如是之盛福壽康寧如是之備退休間逸如是之高其所未甚留意者如來一大事因緣而已今茲又復於真性有所悟入抃敢為賀於門下也公以所證形於尺素而為鄭公同事攝蓋不孤先聖囑纍而然元豐間以太子少保歸三衢與里民不間位貌名所居為高齊有偈見意曰腰佩黃金已退藏箇中消息也尋常時人要識高齊老只是柯村趙四郎又志其壽塋曰吾政已致壽七十二百歲之後歸此山地彼真法身不即不離充滿大千普現悲智不可得藏不可得置壽塋之說如是如是觀其漏泄家風了無剩語豈容裴龐擅美於前耶若夫身退名遂善始令終不出戶庭心契佛祖賢於知機遠禍駕言從赤松子遊者遠矣湖州西余淨端禪師字表明出於湖之歸安丘氏甫六歲事吳山解空院寶暹為師暹數欲以資補端謝曰志不願為進納僧當肆業與三寶數亦未晚耳年二十有六始獲僧服既而觀弄獅子頓契心法乃從仁嶽法師受楞嚴要旨一日嶽以經中疑難十數使其徒答之唯端呈二偈曰七處徵心心不遂懵懂阿難不瞥地直饒徵得見無心也是泥中洗土塊又曰八還之教垂來久自古宗師各分剖直饒還得不還時也是蝦跳不出斗嶽視而驚異曰子知見高妙必弘頓宗于時齊嶽禪師住杭之龍華道價照映東吳端往參禮機緣相契不覺奮迅翻身作狻猊狀嶽因可之自是叢林雅號為端獅子端天資慈祥戒撿不違恤飢問寒如切諸己章丞相子厚由樞政歸吳致端住靈山繼遇有詔除拜適乃翁體中不佳進退莫擬端投以偈曰點鐵成金易忠孝兩全難子細思量著不如箇湖州長興靈山孝感禪院老松樹下無用野僧間又嘗往金陵謁王荊公以其在朝更新庶務故作偈曰南無觀世音說出種種法衆生業海深所以難救拔往往沈沒者聲聲怨菩薩吳興劉燾撰端塔荊公平時見端偈語稱賞之曰有本者故如是然所獻二公偈並出禪悅遊戲使不以方外有道者遇之其取詬厲也必矣此可謂相忘於道術也歟空室道人者直龍圖閣范公珣之女幼聰慧樂於禪寂因從兄守官豫章之分寧遂參死心禪師于雲巖既於言下領旨尋以偈伸讚死心曰韶陽死心靈源甚深耳中見色眼裏聞聲凡明聖昧後富前貧利生濟物點鐵成金丹青徒狀非古非今死心問之曰死心非真向甚麼處讚若讚死心死心無狀若讚虗空虗空無跡無狀無跡下得箇甚麼語若下得語親見死心對曰死心非真真非死心虗空無狀妙有無形絶後再穌親見死心於是死心笑而已靈源禪師遂以空室道人號之自爾叢林知名政和間居金陵圜悟禪師住蔣山佛眼禪師亦在焉因機語相契二師稱賞然道韻間淡似不能言者至於開廓正見雅為精峭偈句有讀法界觀曰物我元無二森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡意動靜悉圓通又設浴於保寧揭榜于門曰一物也無洗箇甚麼纖塵若有起自何來道取一句子玄乃可大家入浴古靈只解揩背開士何曾明心欲證離垢地時須是通身汗出盡道水能洗垢焉知水亦是塵直饒水垢頓除到此亦須洗却後於姑蘇西竺院剃髮為尼名惟久宣和六年趺坐而終道人生於華胄不為富貴籠絡傑然追蹤月上女直趣無上菩提又變形服與鐵磨為伍至於生死之際效驗異常非志烈秋霜疇克爾耶太史黃公魯直元祐間丁家艱館黃龍山從晦堂和尚遊而與死心新老靈源清老尤篤方外契晦堂因語次舉孔子謂弟子以我為隱乎吾無隱乎爾吾無行而不與二三子者是丘也於是請公詮釋而至于再晦堂不然其說公怒形於色沈默久之時當暑退凉生秋香滿院晦堂乃曰聞木犀香乎公曰聞晦堂曰吾無隱乎爾公欣然領解及在黔南致書死心曰往日嘗蒙苦口提撕常如醉夢依俙在光影中蓋疑情不盡命根不斷故望崖而退耳謫官在黔州道中晝臥覺來忽然廓爾尋思平生被天下老和尚謾了多少唯有死心道人不肯乃是第一相為也靈源以偈寄之曰昔日對面隔千里如今萬里彌相親寂寥滋味同齊粥快活談諧契主賓室內許誰參化女眼中休自覓瞳人東西南北難藏處金色頭陀笑轉新公和曰石工來斫鼻端塵無手人來斧始親白牯狸奴心即佛龍睛虎眼主中賓自𢹂缶去沽村酒却著衫來作主人萬里相看常對面死心寮裏有清新黃公為文章主盟而能鋭意斯道於黔南機感相應以書布露以偈發揮其於清新二老道契可槩見矣噫世之所甚重者道而已公既究明則杜子美謂文章一小技豈虗也哉蹣菴成禪師世姓劉宜春人裂儒衣冠著僧伽梨於仰山已而從普融平公得出世法宣和初住東京淨因太尉陳良弼建大會禪講畢集有善法師賢首宗之雄者致問諸禪曰吾佛設教自小乘至于圓頓掃除空有獨證真常然後萬德莊嚴方名為佛而禪宗以一喝轉凡成聖考諸經論似相違背今一喝若能入五教是為正說若不能入五教是為邪說是時諸禪列坐法真禪師一公以目眴慈受禪師深公深復肘師使對之師乃召善而謂之曰承法師所問不足勞諸大禪師之酬只淨因小長老可解法師之惑其五教者如愚法小乘教乃有義也如大乘始教乃空義也如大乘終教乃不有不空義也所謂大乘頓教乃即有即空義也所謂一乘圓教乃空而不有有而不空義也我此一喝非唯能入五教至於世間諸子百家一切技藝悉能相入乃喝曰還聞麼善曰聞成曰汝既聞則此一喝是有是能入小乘教又召善曰汝今還聞麼善曰不聞成曰汝既不聞則適來一喝是無是能入大乘始教我初一喝汝既道有喝久聲銷汝復道能道無則元初實有道有則即今實無既乃不有不無是能入終教我有喝之時有非是有因無故有無喝之時無非是無因有故無即有即無能入頓教我此一喝不作一喝用有無不及情解俱忘道有之時纖毫不立道無之時橫遍虗空即此一喝入百千萬億喝百千萬億喝入此一喝是能入圓教善遂稽首謝師復召善曰乃至一語一默一動一靜從古至今十方虗空萬像森羅六趣四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界唯心萬法唯識四時八節陰陽一致謂之法性是故華嚴經云法性遍在一切處有相無相一聲一色全在一塵中含四義事理無邊周遍無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在善又問曰如何是向下一路成曰汝且向下會取善曰如何是寶所成曰非汝境界善曰望禪師慈悲成曰任從滄海變終不為君通善於是膠其口褫其氣愀然變容愧怍而退噫成之學贍道明左右逢原乘機挫鋭於人天衆前借使先德扶宗亦蔑以加於此矣玉泉皓禪師元豐間首衆僧於襄陽谷隱望聳諸方無盡居士張公奉使京西南路就謁之問曰師得法何人皓曰復州北塔廣和尚公曰與伊相契可得聞乎皓曰只為伊不肯與人說破公善其言致開法于郢州大陽是時谷隱主者私為之喜謂我首座出世盛集緇素以為歆艷皓登座曰承皓在谷隱十年不曾飲谷隱一滴水嚼谷隱一粒米汝若不會來大陽為汝說破擕拄杖下座傲然而去尋遷玉泉有示衆曰一夜雨雱烹打倒葡萄棚知事頭首行者人力拄底拄撑底撑撑撑拄拄到天明依舊可憐生自謂此頌法身向上事如傅大士云空手把鋤頭洞山云五臺山上雲蒸飯只頌得法身邊事然為人超放未易以凡聖議嘗製犢鼻裩書歷代祖師名而服之乃曰唯有文殊普賢較些子且書於帶上故叢林目為皓布裩有侍僧效之皓見而詬曰汝具何道理敢以為戲事耶嘔血無及耳僧尋於鹿門如所言而逝嗚呼世所同者道所異者跡而已皓之唱道開豁正見至於示跡殊常則為不測人求於往昔殆鄧隱峰普化之流亞歟黃龍忠道者初至舒州龍門縱步水磨所見牌云法輪常轉豁然有省撫掌說偈曰轉大法輪目前包裹更問如何水推石磨遂寫而作圓相於後詣方丈呈佛眼禪師已而禮辭渡九江登廬阜露眠草宿蛇虎為鄰於山舒水緩處會意則居或數日不食或連宵不臥髮長不剪衣弊不易所以禪會雅呼為忠道者方是時死心禪師住黃龍道重一時學者至無所容故於季春結制以限來者死心道貌德威鮮敢嬰其鋒忠直前抗論有偈風之曰莫怪狂僧罵死心死心結夏破叢林叢林明眼如相委此語須教播古今又迫暮持白木劒造其室而問曰聞老和尚不懼生死是否死心擬對忠即揮劒死心引頸而笑忠擲劒于地作舞而出馮給事濟川嘗有請忠住勝業疏略曰佛眼磨頭悟法輪之常轉死心室內容慧劒以相揮世以為實録云福州資福善禪師古田人姓陳氏少有逸氣祝髮於寶峰院即出嶺參侍石霜慈明禪師當時龍象如翠巖真公尤所屈服故天下叢林知有善侍者名及禮辭慈明還閩慈明口占偈調之曰七折米飯出爐胡餅自此一別稱鎚落井既而出世里中鳳林逮遷資福則碌碌無聞焉以故言句亦罕傳於世有三玄要訣偈曰三玄三要與三訣四海禪人若為別西瞿耶土競喧鍧北單越人打鐵馬鳴龍樹擬何云彌勒金剛皆咬舌文殊大笑阿呵呵迦葉欲言言不得言不得釋迦老子頭鬚白頭髮白一二三四五六七又示衆曰間拋三寸刃鋒鋩匝地冰霜定紀綱若是丈夫真意氣任君敲磕振風光二曰垂鈎四海浪吞侵罕遇獰龍動角鱗獅子嚬呻全意氣縱橫誰是顯當人嗚呼善與黃龍楊岐翠巖為鴈行況蚤於諸公間言論風旨亦優為之何得歸鄉卒中慈明之調耶圜悟禪師政和間謝事成都昭覺復出峽南遊時張無盡公寓荊南以道學自居少見推許圜悟艤舟謁之劇談華嚴旨要曰華嚴現量境界理事全真初無假法所以即一而萬了萬為一一復一萬復萬浩然莫窮心佛衆生三無差別卷舒自在無礙圓融此雖極則終是無風匝匝之波公於是不覺促榻圜悟遂問曰到此與祖師西來意為同為別公曰問矣圜悟曰且得沒交涉公色為之慍圜悟曰不見雲門道山河大地無絲毫過患猶是轉句直得不見一色始是半提更須知有向上全提時節彼德山臨濟豈非全提乎公乃首肯翌日復舉事法界理法界至理事無礙法界圜悟又問此可說禪乎公曰正好說禪也圜悟笑曰不然正是法界量裏在蓋法界量未滅若到事事無礙法界法界量滅始好說禪如何是佛乾屎橛如何是佛麻三斤是故真淨偈曰事事無礙如意自在手把豬頭口誦淨戒趂出淫坊未還酒債十字街頭解開布袋公曰美哉之論豈易得聞乎夫圜悟融通宗教若此故使達者心悅而誠服非宗說俱通安能爾耶廬山羅漢小南禪師汀州張氏子州南金泉院乃其故居參祐禪師於潭之道林獲印可隨遷羅漢而掌堂司即分座攝納及祐移雲居以其繼席名重諸方學者翕然歸之時有居士張戒者雅意參道一日南問曰如何張曰不會南復詰之不已張忽領旨遽以頌對曰天不戴兮地不知誰言南北與東西身眠大海須彌枕石筍抽條也太奇張尋取辭南以二偈示之曰汝到廬山山到汝更誰別我廬山去出門問取嶺頭風大道騰騰無本據又曰頭戴烏巾著白襴山房借汝一年間出門為說來時路家在黃陂翠靄間羅漢準世系以黃龍是大父名既同而道望逼亞故叢林目為小南尊黃龍為老南然羅漢以傳道為志閲七寒暑住世四十有三白雖所蘊未伸暐然名見當時而垂稱於後世雲居可謂有子矣大覺禪師昔居泐潭燕坐室中見金蛇從地而出須臾隱去聞者讚為吉徵未幾自廬山圓通赴詔住東都淨因先是仁廟閲投子語録至僧問如何是露地白牛投子連叱由茲契悟乃製釋典頌十四首今只記其首篇曰若問主人公真寂合太空三頭并六臂臘月正春風尋以賜璉璉和曰若問主人公澄澄類碧空雲雷時鼓動天地盡和風既進經乙夜之覽宣賜龍腦鉢璉謝恩罷捧鉢曰吾法以壞色衣以瓦鐵食此鉢非法遂焚之中使回奏皇情大悅久之奏頌乞歸山曰六載皇都唱祖機兩曾金殿奉天威青山隱去欣何得滿篋唯將御頌歸御和曰佛祖明明了上機機前薦得始全威青山般若如如體御頌收將甚處歸再進頌謝曰中使宣傳出禁圍再令臣住此禪扉青山未許藏千拙白髮將何補萬機雨露恩輝方湛湛林泉情味苦依依堯仁況是如天闊應任孤雲自在飛至治平中上疏丐歸英廟付以劄子曰大覺禪師懷璉受先帝聖眷纍錫宸章屢貢款誠乞歸林下今從所請俾遂間心凡經過小可菴院隨性住持或十方禪林不得抑逼堅請璉擕之東歸鮮有知者蘇翰林軾知杭時以書問之曰承要作宸奎閣謹已撰成衰朽廢學不知堪上石否見參寥說禪師出京日英廟賜手詔其略云任性住持者不知果有否如有切請録示全文欲添入此一節璉終藏而不出逮委順後獲於篋笥其不暴耀足以羞挾權恃寵者之顏若夫仁廟萬機之暇與璉唱酬發揮宗乘以資至治所以宸奎閣記謂得佛心法古今一人而已誠哉斯言也富鄭公鎮亳州時迎華嚴顒公館於州治咨以心法既有證入而別後答顒書曰示諭此事問佛必有夙因非今生能辨誠是如此然弼遭過和尚即無始以來忘失事一旦認得此後須定拔出生死海不是尋常恩知雖盡力道斷道不出也和尚得弼百千其數何益於事不過得人道華嚴會下出得箇老病俗漢濟得和尚甚事所云淘汰其多此事誠然每念古尊宿始初在本師處動是三二十年少者亦是十數年侍奉日日聞道聞法方得透頂透底却思弼兩次蒙和尚垂顧共得兩箇月請益更作聰明過人能下得多少工夫若非和尚巧設方便著力擲發何由見箇涯岸雖粉骨碎身無以報答未知何日再得瞻拜但日夕依依也噫先佛特稱富貴學道難況貴極人臣據功名之會而成辦焉此尤為難耳形以汗簡尊奉顒公而自謂不是尋常恩知豈欺人哉圓照禪師本公天資純誠而少緣飾初遊雲居同數友觀石鼓相率賦頌或議本素不從事筆硯乃戲強之本即賦曰造化功成難可測不論劫數莫窮年如今橫在孤峰上解聽希聲遍大千儕輩為之愕然尋謁懷禪師於池陽景德既領旨而與衆作息莫有知者一日懷設問曰泥犁長夜苦聞者痛傷心調達在地獄中為甚麼却得三禪天樂所對未有契者懷曰此須本道者下語始得遂亟呼而至理前語問之本曰業在其中自是一衆改觀其後被詔住慧林道契神廟而名落天下其希聲遍大千之語豈苟然哉明教禪師嵩公明道間從豫章西山歐陽氏昉借其家藏之書讀於奉聖院遂以佛五戒十善通儒之五常著為原教是時歐陽文忠公慕韓昌黎排佛盱江李泰伯亦其流嵩乃擕所業三謁泰伯以論儒釋吻合且抗其說泰伯愛其文之高服其理之勝因致書譽嵩於文忠公既而居杭之靈隱撰正宗記定祖圖齎往京師經開封府投狀府尹王公素仲儀以劄子進之曰臣今有杭州靈隱寺僧契嵩經臣陳狀稱禪門傳法祖宗未甚分明教門淺學各執傳記古今多有爭競故討論大藏經備得禪門祖宗所出本末因刪繁撮要撰成傳法正宗記一十二卷并𦘕祖圖一面以正傳記謬誤兼注輔教編印本一部三卷上陛下書一封並不干求恩澤乞臣繳進臣於釋教粗曾留心觀其筆削注述故非臆論頗亦精緻陛下萬機之暇深得法樂願賜聖覽如有可采乞降中書看詳特與編入大藏目録取進此仁廟覽其書可其奏敕送中書丞相韓魏公參政歐陽文忠公相與觀歎探經考證既無訛謬於是朝廷旌以明教大師賜書入藏中書劄子曰權知開封府王素奏杭州靈隱寺僧契嵩撰成傳法正宗記并輔教編三卷宣令傳法院於藏經內收附劄付傳法院準此嵩之高文至論足以寄宣大化既經進獻獲收附於大藏則維持法綱之功日月不能老矣嗟夫吾徒有終身不過目者豈知潛利陰益之所自耶蜀僧普首座自號性空菴主參見死心禪師居華亭最久雅好吹鐵笛放曠自樂凡聖莫測亦善為偈句開導人其山居曰心法雙忘猶隔妄色空不二尚餘塵百鳥不來春又過不知誰是住菴人又警衆曰學道猶如守禁城晝防六賊夜惺惺中軍主將能行令不動干戈致太平又曰不耕而食不蠶衣物外清間適聖時未透祖師關棙子也須有意著便宜又曰十二時中莫住工窮來窮去到無窮直須洞徹無窮底踏倒須彌第一峰雪竇持禪師嘗有偈酬之曰性空老人何快活只有三衣并一鉢叢林端的死心兒見膽開談心豁豁有時吹笛當言說一聲吹落西江月桃花菴中快活時往往觀者舞不徹甚道理能歡悅搖手向人應道別堪笑無人知此意盡道稱鎚硬似鐵難謾唯有當行家為報臨機莫漏泄既而欲追船子和尚故事乃曰坐脫立亡不若水葬一省燒柴二免開壙撒手便行不妨快暢誰是知音船子和尚高風難繼百千年一曲漁歌少人唱仍別衆曰船子當年返故鄉沒蹤跡處妙難量真風偏繼知音者鐵笛橫吹作散場即語緇素曰吾去矣遂於青龍江上乘木盆張布帆吹鐵笛泛遠而沒持既聞其水化以偈悼之曰僧不僧俗不俗曾得死心親付囑平生知命只逍遙行道苦無清淨福東西南北放癡憨七十七年揑怪足漆桶裏著到波濤裏洗浴箇中誰會無生曲隨潮流去又流歸莫是菴前戀笻竹阿呵呵老大哥快活誰人奈汝何噫生死之故亦大矣普以為遊戲非事虗言觀其所存豈得而議哉溈山小秀禪師與法雲大秀禪師久依天衣懷公號為飽參俱有時名故叢林以大小呼之因結伴探諸方首謁圓鑑遠公于浮山遠欲羅致乃示以偈并所編禪門九帶集而諭之曰非上根利智何足語此哉大秀陰知其意即和偈曰孰能一日兩梳頭繓得髻根牢便休大底還他肌骨好不搽紅粉也風流于時南禪師居黃檗積翠菴小秀聞僧舉三關語悚然驚異欲往見之大秀曰吾不疑矣小秀於是獨行大秀遲其不復潛令僧窺南公作為僧至朞月見其孤坐一榻泊如也返告大秀曰此老無他長但修行道者僧耳大秀由是讓小秀曰這措大中途失守負吾先師大秀尋遊淮上首衆僧於白雲而端禪師舉之出世四面山小秀於黃檗久而有契證聞大秀遷棲賢以偈寄曰七百高僧法戰場廬公一偈盡歸降無人截斷黃梅路剛被迢迢過九江又嘗頌三關話曰我手佛手誰人不有分明直用何須狂走我腳驢腳高低踏著雨過苔青雲開日爍問我生緣處處不疑語直心無病誰論是與非小秀弋陽應氏子家世業儒環安院乃其故居也若大秀因人之言昧宗師於積翠而能依白雲蓋得所擇小秀疑三關話而求所決真不自欺矣爾後俱為法道盟主其所決所擇亦何可訾哉台州護國元禪師叢林雅號為元布袋初參圜悟禪師於蔣山因僧讀死心小參語云既迷須得箇悟既悟須識悟中迷迷中悟迷悟兩忘却從無迷悟處建立一切法元聞而疑即趨佛殿以手托開門扉豁然大徹繼而執侍圜悟機辨逸發圜悟操蜀語目為聱頭元侍者遂自題肖像付之曰生平只說聱頭禪撞著聱頭如鐵壁脫却羅籠截腳跟大地撮來墨漆黑晚年轉復沒刁刀奮金剛椎碎窠窟他時要識圜悟面一為渠儂併拈出圜悟歸蜀元還浙東鏟彩埋光不求聞達括蒼守耿公延禧蓋嘗問道於圜悟且閲其語録至題肖像得元為人乃致開法南開山遣使物色至台之報恩獲於衆寮迫其受命方丈古公乃靈源高弟聞其提唱亦深駭異以是見當時所至龍象蹴踏如元高道尚復群居既𨗉所養逢辰則出所以軒特于世今夫珉中玉表急於求售者視元之操履能無恧乎靈源禪師蚤參承晦堂於黃龍而清侍者之名著聞叢林元祐七年無盡居士張公漕江西故欽慕之是時靈源寓興化公檄分寧邑官同諸山勸請出世於豫章觀音其命嚴甚不得已遂親出投偈辭免曰無地無針徹骨貧利生深愧乏餘珍中大施門難啓乞與青山養病身黃大史魯直憂居里閈有手帖與興化海老曰承觀音虗席上司甚有意於清兄清兄確欲不行亦甚好蟠桃三千年一熟莫做褪花杏子摘却此事黃龍興化亦當作助道之緣共出一臂莫送人上樹拔却梯也噫江西法道盛於元祐間蓋彈壓叢林者眼高耳況遴選之禮優異如此靈源以偈力辭而太史以簡美之得非有所激而云臨卭復首座頂平目深短小精悍常往來淮山白雲端和尚深器重之一日遊山次白雲且行且語曰子曾見甚尊宿試語我來復曰頃在湖湘如福嚴雅公上封鵬公北禪賢公粗嘗親依白雲笑曰元來見作家來我且問你玄沙不出嶺此意如何復趨前將白雲手一掐白雲又問靈雲見桃花悟道作麼生復即踏倒曰將謂是箇漢白雲蹶起笑而已自是叢林推敬至五祖演和尚亦待以父執且使佛眼親其緒論佛眼因問以佛法大意對曰安仁出草鞋復後歸鄉年八十餘而終觀其機契白雲則可知所蘊矣而始終一節亦足以增懿緇林豈恃高踞雄席然後為榮哉南嶽芭蕉菴主泉禪師生於泉南祝髮於崇福院既出嶺造汾陽參禮昭禪師受其印可隱于衡嶽佯狂垢汙世莫能測以楮為帔所至聚觀遂自歌曰狂僧一條紙帔不使毳針求細意披來只麼且延時忍觀蠶苦勞檀施縱饒羅綺百千般濟要無過是禦寒僧來玩俗來玩黑噴雲霞山水現五嶽煙凝是翠縑四溟浪白為銀線他人云甚摸樣剛把漁箋作高尚雖多素質混然成免效田畦憑巧匠逞金襴與紫袍狂僧直是心無向迦葉頭陀遙見時定將白㲲來相讓向伊言我不換老和尚泉平時慈明厚之以友于老南敬之以叔父至於放曠自任簡脫無撿豈非所謂百不為多一不為少耶其製楮為帔無乃矯於侈飾肆意成歌有以諷於浮競由是而觀未容無取也無盡居士張公天覺蚤負禪學猶欲尋訪宗師與之決擇因朱給事世英語及江西兜率悅禪師禪學高妙聰敏出於流類元祐六年公漕江西按部分寧五禪逆於旅亭顧問至兜率公曰聞師聰敏之名久矣悅遽對曰從悅臨濟兒孫若以聰敏說文章定似都運談禪公雖壯其言而意不平遂作偈命五禪舉揚曰五老機緣共一方神鋒各向袖中藏明朝老將登壇看便請橫矛戰一場悅當其末提綱之語盡貫前者公陰喜之乃遊兜率相與夜談及宗門事公曰比看傳燈録一千七百尊宿機緣唯疑德山托鉢話悅曰若疑托鉢話其餘則是心思意解何曾至大安樂境界公憤然就榻屢起夜將五鼓不覺躍翻溺器忽大省發喜甚即扣悅丈室門謂悅曰已捉得賊了也悅曰贓物在甚麼處公擬議悅曰都運且寢翌旦公有頌云鼓寂鐘沈托鉢回巖頭一拶語如雷果然只得三年活莫是遭他受記來別去未幾悅遂歸寂公登右揆之明年當宣和辛卯歲二月奏請悅諡號遣使持文祭於塔祠曰昔者仰山謂臨濟曰子之道他日盛行於吳越間但遇風則止後四世而有風穴延沼沼以讖常不懌晚得省念而喜曰正法眼藏今在汝躬死無遺恨矣念既出世首山荒村破寺衲子才三十餘輩然其道大振天下師於念公為六世孫於雲菴為嫡嗣住山規範足以追首山機鋒敏妙初不減風穴余頃歲奉使江西按部西安相識於龍安山中抵掌夜語盡得其末後大事正宗顯決方以見晚為歎而師遽亦化去惜其福不逮慧故緣不勝喜其德不可掩故終必有後有若踈山了常兜率慧照慈雲明鑒清溪志言者皆說法一方有聞於時有若羅漢慧宜楊岐子圓廣慧守真贛川智宣者皆遁跡幽居痛自韜晦風穴得一省念遂能續列祖壽命今龍安諸子乃爾其盛豈先師靈骨真灰燼無餘耶蓋其道行實為叢林所宗向有光佛祖有助化風思有以發揮之為特請于朝蒙恩追諡真寂大師嗚呼余惟與師神交道契故不敢忘外護之志雖其死生契闊之異而蒙被天下之殊恩則幸亦共之仰惟覺靈祗此榮福夫蔚為儒宗而崇佛道未有如公者然非敏手安能激發苟非上根未易承當至於嶽立廊廟展大法施既不忘悅之道義而特與追榮矢心以詞勤勤若此蓋所以昭示尊師重法歟五祖演和尚在白雲掌磨所一日端和尚至語之曰有數禪客自廬山來詰之皆有悟入處教伊說亦說得有來由舉因緣向伊亦明得教下語亦下得只是未在你道如何演於是大疑即私自計曰既悟了說亦說得明亦明得如何却未在遂參究纍日忽然省悟從前寶惜一時放下厥後嘗曰吾因茲出一身白汗便明得下載清風雪堂行公有頌發揮之曰腦後一椎喪却全機淨倮倮兮絶承當赤灑灑兮離鈎錐下載清風付與誰嗚呼中興臨濟法道蓋五祖矣而於白雲日董廝役辦衆資給其服勤可謂至矣然亦未聞館以明窗寵以清職何哉潼川府天寧則禪師蚤業儒詞章婉縟既從釋得法於儼首座而為黃檗勝之孫有牧牛詞寄以滿庭芳調曰咄這牛兒身強力健幾人能解牽騎為貪原上緑草嫩離離只管尋芳逐翠奔馳後不顧傾危爭知道山遙水遠回首到家遲牧童今有智長繩牢把短杖高提入泥入水終是不生疲直待心調步穩青松下孤笛橫吹當歸去人牛不見正是月明時世以禪語為詞意句圓美無出此右或譏其徒以不正之聲混傷宗教然有樂於謳吟則因而見道亦不失為善巧方便隨機設化之一端耳西蜀廣道者住筠陽九峰為雲菴真淨之嗣天資純至脫略世故有頌趙州勘婆話曰指路婆婆在五臺禪人到此盡癡呆一拳打破扶桑國杲日當空照九垓一日有戒上座者善於醫術分衛而歸命廣說法戒出致問曰如何是九峰境答曰滔滔雙㵎水落落九重山進曰如何是境中人答曰長者自長短者自短進曰人境已蒙師指示向上宗乘事若何答曰喫棒得也未戒作禮而退廣遂問侍者曰升座為何事侍者曰戒藥王請廣曰金毛獅子子出窟便咆哮且道金毛獅子子是阿誰良久云即是今晨戒藥王便下座廣晚年依同門友深公於寶峰雪夜深與擁爐語論之久潛使人戲去廣臥榻衾褥及就寢摸索無有置而不問須臾熟睡鼻息如雷其忘物忘我如此逸人季商老寄以詩曰已透雲菴向上關薰爐茗碗且開顏頭顱無意掃殘雪毳衲從來著壞山瘦節直宜青嶂立道心長與白鷗間歸來天末一回首疑在孤峰煙靄間廣之高風逸韻於詩可見矣妙喜老師亦嘗與遊從言其大槩是時叢林以道者目之真名稱厥實也龍牙才禪師受潭帥曾公孝序之請既開堂於天寧有僧致問德山棒臨濟喝今日請師為拈掇答云蘇嚧蘇嚧進云蘇嚧蘇嚧還有西來意也無答云蘇嚧蘇嚧由是叢林呼為才蘇嚧一日曾延見諸禪因問曰龍牙答話只蘇嚧如何道林月菴乃應聲而顧諸禪曰借問諸方會也無曾笑曰可聯成一頌以為禪悅之樂時座無續者及傳至雲蓋有慈觀長老曰昨夜虗空開口笑祝融吞却洞庭湖世稱月菴續後二句豈不孤慈觀耶今徑山法音首座是時與雲蓋法席目擊其事然月菴道滿天下亦何藉此西蜀表自禪師參演和尚於五祖時圜悟分座攝納五祖使自親炙焉圜悟曰公久與老師法席何須來探水脫有未至舉來品評可也自乃舉德山小參話圜悟高笑曰吾以不堪為公師觀公如是則有餘矣遂令再舉至今夜不答話處圜悟驀以手掩自口曰止只恁看得透便見德山也自不勝其憤趨出以坐具摵地曰那裏有因緣只教人看一句於是朋儕競勉自從圜悟指示未幾有省及遷圜悟監總院務即舉自為座元圜悟私告五祖曰渠只得一橛大法未明在須更鍛煉必為法器居無何五祖宣言請自立僧實欲激其遠到自聞之深有所待一日上堂以目顧自曰莫妄想便下座自氣不平趨琅瑘啓公法社久之圜悟往撫存遂於言下大徹乃同歸五祖方命立僧圜悟即還蜀出世昭覺演既委順郡守以自繼席開堂拈香其略云若為今成都昭覺勤禪師去我於此時如得其髓為甚麼不為他不見道魚因水有子因母親由是觀圜悟於自有卵翼之功而向人天衆前吐露直欲雪其所負則與黃檗酬百丈有間矣嗚呼自之無嗣諒有以夫成都府世奇首座初於舒州龍門燕坐瞌睡間群蛙忽鳴誤聽為淨髮版響亟趨往有曉之者曰蛙鳴非版也奇恍然詣方丈剖露佛眼禪師曰豈不見羅睺羅奇遽止曰和尚不必舉待去自看未幾有省乃占偈曰夢中聞版響覺後蝦䗫啼蝦䗫與版響山嶽一時齊由是益加參究洞臻玄奧佛眼屢舉分座且力辭曰世奇淺陋豈敢妄作模範況為人解粘去縛如金篦刮膜脫有差則破睛矣佛眼美似偈曰有道只因頻退步謙和元自慣回光不知已在青雲上猶更將身入衆藏其謙抑自守見於佛眼之偈而浮躁衒露好為人師者聞奇之高風得不羞哉潭州東明遷禪師乃真如哲公之嗣天資雅淡知見甚高晚年逸居溈山真如菴有志于道者多往親炙之一日閲楞嚴經至如我按指海印發光有僧侍傍指以問曰此處佛意如何遷曰釋迦老子好與三十棒僧曰何故遷曰用按指作甚麼僧又曰汝暫舉心塵勞先起又作麼生遷曰亦是海印發光僧當下欣然曰許多時蹉過今日方得受用也忠道者住山時遷尚無恙相得歡甚然距今未久叢林幾不聞名矣觀其言論若此則意氣高間之韻可想見也饒州薦福本禪師自江西雲門參侍妙喜和尚至泉南小溪于時英俊畢集受印可者多矣本私謂其棄己且欲發去妙喜知而語之曰汝但專意參究如有所得不待開口吾已識也既而有聞本入室故謂之曰本侍者參禪許多年逐日只道得箇不會本詬之曰這小鬼你未生時我已三度霍山廟裏退牙了好教你知由茲益鋭志以狗子無佛性話舉無字而提撕一夕將三鼓倚殿柱昏寐間不覺無字出口吻間忽爾頓悟後三日妙喜歸自郡城本趨丈室足才越閫未及吐詞妙喜曰本鬍子這回方是徹頭尋於徑山首衆逮散席訪友謙公于建陽庵中謙適舉保寧頌五通仙人因緣曰無量劫來曾未悟如何不動到其中莫言佛法無多子最苦瞿曇那一通謙復曰我愛它道如何不動到其中既是不動如何到看他古人得了等間拈出來自然抓著人癢處本曰因甚麼却道最苦瞿曇那一通謙曰你未生時我已三度霍山廟裏退牙了也於是相顧大笑其朋友琢磨之益蓋如印圈契約之無差至於會心辴然可使後世想望其風采黃龍震禪師初從丹霞淳公遊閲再夏而得曹洞宗旨作頌曰白雲深覆古寒巖異草靈花彩鳳銜夜半天明日當午騎牛背面著靴衫淳見異之及抵溈山作插鍬井頌曰盡道溈山父子和插鍬猶自帶干戈至今一井明如鏡時有無風匝匝波已而參草堂清公獲印可尋出世三遷而至百丈道大顯著紹興己巳有律師妄踞黃龍禪衲散去主事者走錢塘求王承宣繼先之書達洪帥張公如瑩堅命震以從衆望既而主事請致書謝王公震讓曰若王公為佛法故何謝之有況吾與之素昧平生主事恧縮而退彼交結權貴倚為藩垣者聞其言亦足顏汗紹興以來宗師言行相應與秋霜爭嚴捨震其誰哉湖州上方嶽禪師少與雪竇顯公結伴遊淮山聞五祖戒公喜勘驗顯未欲前嶽乃先往徑造丈室戒曰上人名甚麼對曰齊嶽戒曰何似泰山嶽無語戒即打趂嶽不甘翌日復謁戒曰汝作甚麼嶽回首以手畫圓相呈之戒曰是甚麼嶽曰老老大大胡餅也不識戒曰趂爐竈熟更搭一箇嶽擬議戒拽拄杖趂出門及數日後嶽再詣乃提起坐具曰展則大千沙界不展則毫髮不存為復展即是不展即是戒遽下繩牀把住云既是熟人何須如此嶽又無語戒又打出以是觀五祖真一代龍門矣嶽三進而三遭點額張無盡謂雪竇雖機鋒頴脫亦望崖而退得非自全也耶徐龍圖禧元豐五年自右正言出知渭州既歸分寧請黃龍晦堂和尚就雲巖為衆說法有疏曰三十年前說法不消一箇莫字如今荊棘塞路皆據見向開門只道平地上休起骨堆不知那箇是他平地只道喫粥了洗鉢盂去不知鉢盂落在那邊不學溷絶學語言在根作歸根證據木刻鷂子豈解從禽羊蒙虎皮其奈喫草故識病之宗匠務隨時而叮嚀須令向千歲松下討茯苓逼將上百尺竿頭試腳步直待骸骨回回方與眼上安眉圖他放匙把筯自由識箇啜羹喫飯底滋味不是鏤明脊骨骨勝末後拳椎法門中如此差殊正見師豈易遭遇昔人所以涉川遊海今者乃在我里吾鄉得非千載一時事當為衆竭力袒肩屈膝願唱誠於此會人天挑屑拔釘咸歸命於晦堂和尚獅子廣座無畏吼聲時至義同大衆虔仰噫今之疏帶俳優而為得體以字相比麗而為見工豈有胸襟流出直截根源若此黃太史為擘窠大書鐫於翠琰高照千古為叢林盛事之傳云寂音尊者洪公初於歸宗參侍真淨和尚而至寶峰一日有客問真淨曰洪上人參禪如何真淨曰也有到處也有不到處客既退洪殊不自安即詣真淨求決所疑真淨舉風穴頌曰五白貓兒爪距獰養來堂上絶蟲行分明上樹安身法切忌遺言許外甥且作麼生是安身法洪便喝真淨曰這一喝也有到處也有不到處洪忽於言下有省翌日因違禪規遭刪去時年二十有九及遊東吳寓杭之淨慈以頌發明風穴意寄呈真淨曰五白貓兒無縫罅等間拋出令人怕翻身跳擲百千般冷地看他成話霸如今也解弄些些從渠歡喜從渠罵却笑樹頭老舅翁只能上樹不能下自後復閲汾陽語録至三玄頌荐有所證妙喜老師蓋嘗語此而叢林鮮有知者夫以文華才辨而掩其道微妙喜亦何由取信於後耶湖州報本元禪師侍南公於黃檗一日為達上座咨聞入室南曰既是達了為甚麼更來元曰事不厭細南曰你便打趕出去不是做得老僧侍者元曰不得一向南遂行入方丈元曰大小黃檗龍頭蛇尾南笑而已尋遊東吳寓姑蘇南峰蘭若高自標致放懷泉石已而郡將禪昆山慧嚴律居致元為第一世追釋南公凡見僧必首問人人盡有生緣作麼生是上座生緣次問我手何似佛手我腳何似驢腳遂成二偈曰相逢不免問生緣一句當鋒旨最玄達磨少林遺隻履却登葱嶺不虗傳又曰欲透宗門向上關須明佛手與驢腳真金不使假金糚莫認醍醐為毒藥元之語録序次具在至於真淨問湛堂語雖異而意同亦可槩見矣今叢林先佛手驢腳而後生緣殊乖創問之旨可不辨明哉淮南祐上座者歷叢席最久而儕輩推重之客鼎州天王寺以道自牧人不得而親踈居無何語衆曰吾去矣或有謂其戲也以故迫之求頌即索毫楮大書曰來不入門去不出戶打破虗空更無回互拍手呵呵歸去來白雲散盡青山露乃趺坐奄盡主事以其未録道具亟呼撼之祐復開目舉手以謝曰不致上纍善為保重是時郡守蘇公亦往致敬撫其遺體曰可謂了事衲僧也鴈山能仁元禪師參妙喜和尚於海上洋嶼菴風骨清癯危坐終日妙喜目為元枯木一日以三世諸佛不知有話徵詰三四豁然領旨妙喜有偈嘉賞之曰萬仞懸崖忽放身起來依舊却惺惺飢餐渴飲無餘事那論昔人非昔人元後居連江縣福嚴菴食指猥衆日不暇給庵有伽藍土偶甚夥遂揭偈於祠曉之曰小菴小舍小叢林土地何須八九人若解輪番來打供免教碎作一堆塵是夕神致夢於山前檀越願如所戒及出世能仁有示徒偈曰鴈山枯木實頭禪不在尖新語句邊背手忽然摸得著長鯨吞月浪滔天元乃洋嶼發明者十三人之一耳然在當時朋伍中最號為癡鈍及其遁跡神亦遵從以至應緣徒尤趨慕蓋自般若殊勝中來豈有他哉佛眼禪師元祐三年為舒州太平持鉢回自淝川是時二十一歲而演和尚將遷海會佛眼慨然曰吾事始濟復參隨往一荒院安能究決己事耶遂作偈告辭曰西別岷峨路五千幸擕瓶錫禮高禪不材雖見頻揮斧鈍足難諳再舉鞭深感恩光同日月未能蹤跡止林泉明朝且出山前去他日重來會有緣演以偈送之曰晼伯臺前送別時桃花如錦柳如眉明年此日憑欄看依舊青青一兩枝佛眼之蔣山坐夏邂逅靈源禪師日益厚善從容言話間佛眼曰比見都下一尊宿語句似有緣靈源曰演公天下第一等宗師何故捨而事遠遊所謂有緣者蓋知解之師與公初心相應耳佛眼得所勉徑趨海會後七年方領旨噫佛眼微靈源墮死水也必矣其能復透龍門乎先德曰成我者朋友豈欺人哉湖州何山辨禪師遊方至西京少林聞僧舉龍門佛眼禪師以古詩發明罽賓王斬獅子尊者話曰楊子江頭楊柳春楊花愁殺渡江人一聲殘笛離亭晚君向瀟湘我向秦默有所契即趨龍門坐夏居無何佛眼舉前話問之辨擬對佛眼以手托開辨趨出豁然大徹復回吐露佛眼拽杖逐之已而山門使丐麥太湖以病不克行遂還苕溪菴于峽山久之出世天聖繼遷數剎嘗頌黃龍三關話曰我手何似佛手黃龍鼻下無口當時所見顢頇至今百拙千醜我腳何似驢腳文殊親見無著好箇玻瓈茶盞不要當面諱却人人有箇生緣從來罪大彌天不是牽犁拽耙便是鼎鑊油煎佛手驢腳生緣謝郎不在漁船底事奔南走北不親祖父田園一日葛待制勝仲𢹂客造其室坐論天地一指萬物一馬袞袞不已辨不之聽葛疑而問曰師謂如何辨笑而不答良久厲聲喚待制葛倉皇應諾辨曰天地一指萬物一馬葛欣然曰須是和尚始得坐客瞪若竦然加敬非所謂具活人手段能如是乎臨川化度淳藏主乃寶峰祥公參徒之傑者該洽內典博綜外乘高尚瀟灑備見于自述山居詩凡數十解今記十有二而已拙直自知趨世遠疏愚羸得住山深現成活計無他物只有鱗皴枝一尋屋架數椽臨水石門通一徑掛藤蘿自緣此處宜投老饒得溪雲早晚過自笑疏狂同拾得誰知癡鈍若南泉幾回食飽遊山倦只麼和衣到處眠無心間淡雲歸洞有影澄清月在潭此景灼然超物外本來成現不須參隨身只有過頭杖飽腹唯憑折腳鐺幾度遣間何處好水聲山色裏遊行瓦爐爇處清煙靄鐵磬敲時曉韻寒一穿數珠粗又重拈來百八不相謾一瓢顏子非為樂四壁相如未是高爭似山家真活計屋頭松韻瀉秋濤數行大字貝多葉一炷粗香古柏根石室靜筵春晝永杜䳌啼破落花村漁父子歌甘露曲擬寒山詠法燈詩深雲勿謂無人聽萬像森羅歷歷知坐石已知毛骨冷漱泉長覺齒牙清箇中有味忘歸念身老無餘合此情幽巖靜坐來馴虎古㵎經行自狎鷗不是忘機能絶念大都投老得心休怕寒懶剃髼鬆髮愛暖頻添榾柮柴栗色伽梨撩亂掛誰能勞力強安排其詠間適情可謂得之至矣儻非中有所養孰能爾耶清逸居士潘興嗣字延之初調德化縣尉同郡許瑊始拜江州守潘往見之瑊不為禮遂懷刺歸竟不之官問道於黃龍南禪師獲其印可嘗曰我清世之逸民故自號焉嘉祐以來公卿交薦章數十上既以筠州軍事推官起之辭不就隱居豫章東湖上琴書自娛一日南公高弟潛菴源禪師訪之見其拂琴次源曰老老大大猶弄箇線索在對曰也要彈教響源曰也不少對曰知心能幾人寂音題其畫像曰毗盧無生之藏震旦有道之器談妙義借身為舌擎大千以手為地機鋒不減龐蘊而解文字禪行藏大類孺子而值休明世舒王強之而不可神考致之而不起此天下士大夫所共聞然公豈止於是而已哉嗚呼公之休官問道有始終之節寂音既暴其隱德著而為讚自茲林下始可謂見一人耳妙喜老師以紹興四年春入閩抵甘蔗洲廣因蘭若坐夏未終徙海上洋嶼揭榜于衆寮曰先德有云雜毒入心識如油入永劫不可取今時兄弟參禪不得只為中毒深入骨髓一向有可得道只管禪將去禪到末後剩得一句時便歡喜如此之輩佛也救不得今後上案只得看經不得看雜文字如違連案出院嗚呼是時衆才五十有奇而閲八晦朔獲證者十有三焉蓋激勵而然耳雲居舜禪師世姓胡宜春人以皇祐間住棲賢而與歸宗寶公開先暹公同安南公圓通訥公道望相亞禪徒交往廬山叢林於斯為盛居無何郡將貪墨舜不忍以常住物結情固位尋有譖於郡將民其衣乃寓太平菴仁廟聞其道行復以僧服寵錫銀鉢盂再領棲賢入院有偈曰無端被譖枉遭迍半載有餘作俗人今日再歸三峽寺幾多道好幾多嗔未幾遷雲居道愈尊衆益盛以偈示衆曰尋求就理兩俱愆不涉二途病亦然孰謂箇中端的處椎胸貧子一文錢嗟夫言忤郡將而獲譴名聞天子而被寵禍福倚伏於舜亦何足云湖州甘露寺圓禪師有漁父詞二十餘首世所盛傳者一而已本是瀟湘一釣客自東自西自南北只把孤舟為屋宅無寬窄幕天席地人難測頃聞四海停戈革金門懶去投書䇿時向灘頭歌月白真高格浮名浮利誰拘得遂以是得名於叢林蓋放曠自如者藉以暢情樂道而謳於水雲影裏真解脫遊戲耳臨安南蕩崇覺空禪師生緣姑熟參侍黃龍死心禪師死心惜其福不逮慧以無應世為囑草堂清公送以偈曰十年聚首龍峰寺一悟真空萬境間此去隨緣且高隱莫將名字落人間尋棲止天台望高叢林應命崇覺未幾院罹回祿黽勉於土木之役亦無倦誨接嘗頌野狐話曰含血潠人先污其口百丈野狐失頭狂走驀地喚回打箇筋斗空之天資精悍知見甚高律身精嚴外請不赴有欲迎齊為架三門乃告以捨家財荷公發心矣背衆食奈我破戒何其固守如此然平居氣凌諸方於學徒亦鮮假詞色真有父風卓然可敬也投子聰禪師與海會演和尚元祐間道望並著淮上賢士大夫多從之遊黃太史魯直亦嘗勉胡尚書少汲問道於聰演具書曰公道學頗得力耶治病之方當深求禪悅照破生死之根則憂畏淫怒無處安腳病既無根枝葉安能為害投子聰老是出世宗師海會演老道行不愧古人皆可親近殊勝從文章之士學妄言綺語增長無明種子也聰老猶喜接高明士大夫渠開卷論說便穿諸儒鼻孔若於義理得宗趣却觀舊所讀書境界廓然六通四闢極省心力也然有道之士須以志誠懇惻歸向古人所謂下人不精不得其真此非虗語嗚呼古今文士於釋教深排而力詆者蓋安於所習毀所不見而然若黃太史雖為江西宗派之鼻祖然見道而知天下無二道故勤勤懇懇曲折指陳以尚書公為知言之人而可與言也金陵有俞道婆者禪林傳其參見琅邪啓禪師家以鬻油餈為業一日聞丐者唱蓮花樂於市云不因柳毅傳書信何緣得到洞庭湖忽有省不覺大笑拋弃油餈與市兒競拾其夫詬曰你何顛耶婆撫掌曰非公境界自是見僧必勘驗時有僧過其門婆遽呼曰兒兒僧曰媽媽爹爹在甚麼處婆轉身拜露柱僧即踏倒曰將謂有多少奇特次見僧問曰上座甚處來僧曰五祖來婆曰五祖長老猶是婆兒子在僧曰婆婆却是誰兒婆曰老婆被上座一問直得立地放尿其頌婆子偷趙州筍因緣曰虎穴魔宮到者稀老婆失腳又懷疑趙州喫掌無人會直至如今成是非宣政間江淮為禪衲淵藪婆於是時吹無孔笛韻出青霄遂致和者旁乎而至機緣偈句流布于世自有賞音為其一唱而三歎也烏巨雪堂行禪師與淨無染書曰比見禪人傳録公拈古於中有僧問趙州如何是佛殿裏底拈云須知一箇髑髏裏內有撑天柱地人愚竊疑傳録之誤此決不是公語也何故蓋楊岐子孫終不肯認箇鑑覺若認鑑覺陰界尚出不得何有宗門奇特事耶因此亦嘗頌之特恃愛照謾以浼聞頌曰不立孤危機未峻趙州老子玉無瑕當頭指出殿裏底剗盡茫茫眼界花行之真慈為不請友以書規拈古之失以頌明趙州之意於宗門有補矣若吾徒不顧其謬妄自提掇豈獨為明眼噱端亦招謗法之愆可不戒哉
